version: 2

models:
  - name: tbl_loan
    description: Canonical representation of all loans across source systems
    tests:
      - dbt_utils.expression_is_true:
          expression: "origination_date <= current_date"
          config:
            severity: error
      - dbt_utils.expression_is_true:
          expression: "exposure_amount > 0"
          config:
            severity: error
      - dbt_utils.expression_is_true:
          expression: "(loan_product = 'TERM_LOAN' AND interest_rate IS NOT NULL) OR (loan_product = 'REVOLVER' AND interest_rate IS NULL)"
          config:
            severity: error
      - dbt_utils.expression_is_true:
          expression: "(loan_product = 'TERM_LOAN' AND term_months IS NOT NULL) OR (loan_product = 'REVOLVER' AND term_months IS NULL)"
          config:
            severity: error
    columns:
      - name: loan_id
        description: Unique loan identifier
        tests:
          - unique
          - not_null
      - name: origination_date
        description: Loan/facility start date
        tests:
          - not_null
      - name: loan_product
        description: Product type
        tests:
          - not_null
          - accepted_values:
              values: ['TERM_LOAN', 'REVOLVER']
              config:
                severity: error
      - name: exposure_amount
        description: Current exposure
        tests:
          - not_null
      - name: batch_date
        description: ETL processing date
        tests:
          - not_null
      - name: ingestion_ts
        description: Timestamp of data ingestion
        tests:
          - not_null

  - name: tbl_account
    description: Distinct accounts from all loan systems
    columns:
      - name: account_id
        description: Unique account identifier
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Account owner
        tests:
          - not_null
          - relationships:
              to: ref('tbl_customer')
              field: customer_id
              config:
                severity: error
      - name: batch_date
        description: ETL processing date
        tests:
          - not_null
      - name: ingestion_ts
        description: Timestamp of data ingestion
        tests:
          - not_null

  - name: tbl_customer
    description: Master customer table with demographic data
    columns:
      - name: customer_id
        description: Unique customer identifier
        tests:
          - unique
          - not_null
      - name: customer_name
        description: Legal customer name
        tests:
          - not_null
      - name: customer_industry
        description: Industry classification
        tests:
          - not_null:
              config:
                severity: warn
      - name: customer_country_cd
        description: ISO country code
        tests:
          - not_null
      - name: customer_state_cd
        description: US state code
        tests:
          - not_null:
              config:
                severity: warn
      - name: customer_country_name
        description: Full country name
        tests:
          - not_null:
              config:
                severity: warn
      - name: customer_state_name
        description: Full state name
        tests:
          - not_null:
              config:
                severity: warn
      - name: ingestion_ts
        description: Timestamp of data ingestion
        tests:
          - not_null

  - name: tbl_account_loan
    description: Explicit many-to-many relationship between accounts and loans
    columns:
      - name: account_id
        description: Account identifier
        tests:
          - not_null
          - relationships:
              to: ref('tbl_account')
              field: account_id
              config:
                severity: error
      - name: loan_id
        description: Loan identifier
        tests:
          - not_null
          - relationships:
              to: ref('tbl_loan')
              field: loan_id
              config:
                severity: error
      - name: origination_date
        description: Loan start date
        tests:
          - not_null
      - name: batch_date
        description: ETL processing date
        tests:
          - not_null
      - name: ingestion_ts
        description: Timestamp of data ingestion
        tests:
          - not_null

  - name: monthly_loan_sales
    description: Analytics view aggregating loan exposure by region, industry, and product
    tests:
      - dbt_utils.expression_is_true:
          expression: "loan_count > 0"
          config:
            severity: error
      - dbt_utils.expression_is_true:
          expression: "total_exposure > 0"
          config:
            severity: error
      - dbt_utils.expression_is_true:
          expression: "avg_exposure > 0"
          config:
            severity: error
      - dbt_utils.expression_is_true:
          expression: "unique_customers > 0"
          config:
            severity: error
    columns:
      - name: origination_month
        description: Month of loan origination
        tests:
          - not_null
      - name: us_region
        description: US state
        tests:
          - not_null
      - name: industry
        description: Customer industry
        tests:
          - not_null:
              config:
                severity: warn
      - name: loan_product
        description: Product type
        tests:
          - not_null
      - name: loan_count
        description: Number of loans
        tests:
          - not_null
      - name: total_exposure
        description: Sum of exposure
        tests:
          - not_null
      - name: avg_exposure
        description: Average loan size
        tests:
          - not_null
      - name: unique_customers
        description: Distinct customers
        tests:
          - not_null
      - name: batch_date
        description: ETL processing date
        tests:
          - not_null
      - name: ingestion_ts
        description: Timestamp of data ingestion
        tests:
          - not_null
